<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student information form</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        padding: 30px;
    }

    form {
        max-width: 800px;
        margin: auto;
        background: #ffffff;
        padding: 25px;
        border-radius: 8px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }

    fieldset {
        margin-bottom: 20px;
        border: 1px solid #ccc;
        padding: 15px;
    }

    legend {
        font-weight: bold;
        padding: 0 10px;
    }

    label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
    }

    input,
    select,
    textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
    }

    .inline {
        width: auto;
        margin-right: 10px;
    }

    .row {
        display: flex;
        gap: 20px;
    }

    .row div {
        flex: 1;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        margin-top: 10px;
    }
</style>

<body>

    <form action="">
        <h1>Student Registration form</h1>

        <!-- Personal Info -->

        <fieldset>
            <legend>Personal information</legend>

            <div class="row">
                <div>
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" placeholder="Enter First Name" required>
                </div>

                <div>
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" placeholder="Enter Last Name" required>
                </div>
            </div>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="user@gmail.com" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your Password" required>

            <label for="phone">Phone Number</label>
            <input type="number" id="phone" placeholder="03 XXXXXXXX" required>

            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" placeholder="dd/mm/yy" required>

            <label>Gender</label>
            <input class="inline" type="radio" name="gender">Male
            <input class="inline" type="radio" name="gender">Female
            <input class="inline" type="radio" name="gender">Prefer not to say

        </fieldset>

        <!-- Educational info -->

        <fieldset>

            <legend>Educational information</legend>

            <label>Highest Qualification</label>

            <select required>
                <option value="select">Select</option>
                <option value="Matric">Matric</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Bachelor's">Bachelor's</option>
                <option value="Master's">Master's</option>
            </select>


            <label>Field of Study</label>

            <select>
                <option value="">Select</option>
                <optgroup label="Computer Science">
                    <option value="">Web & App Development</option>
                    <option value="">Data Science</option>
                    <option value="">AI/ML</option>
                    <option value="">Cyber Security</option>
                </optgroup>

                <optgroup label="Engineering">
                    <option value="">Software</option>
                    <option value="">Electrical</option>
                    <option value="">Machaneical</option>
                </optgroup>

            </select>

            <label>Skills</label>

            <input class="inline" type="checkbox"> Teamwork
            <input class="inline" type="checkbox">Strong Communication
            <input class="inline" type="checkbox"> Problem-solving
            <input class="inline" type="checkbox"> Critical thinking
            <input class="inline" type="checkbox"> Time management

        </fieldset>

        <!-- Uploads & Preferances -->

        <fieldset>

            <legend>Uploads & Preferances</legend>

            <label>Upload Resume</label>
            <input type="file">

            <label>Available Time</label>
            <input type="time">

            <label>Experiance Level (0 - 10)</label>
            <input type="range" min="0" max="10">

        </fieldset>

        <fieldset>

            <legend>Additional information</legend>

            <label>About Yourself</label>
            <textarea rows="6" placeholder="write something about you...."></textarea>

        </fieldset>

        <label for="">
            <input type="checkbox">
            I agree to terms & conditions
        </label>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>


    </form>

</body>

</html>
