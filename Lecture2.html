<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images | Videos | Tables</title>
</head>

<body>
    <h1>HTML Learnings day 02</h1>

    <!-- Image Tags -->
    <img src="./images/image1.jpg" width="300" height="450" alt="">
    <img src="./images/image2.jpg" width="300" height="450" alt="">

    <!-- Video tag -->

    <video controls width="450" height="450">
        <source src="./images/video.mp4">
    </video>

    <!-- Table Tag -->

    <table border="2">
        <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>Ali</td>
            <td>English</td>
            <td>75</td>
            <td>B++</td>
        </tr>
        <tr>
            <td>Haider</td>
            <td>English</td>
            <td>54</td>
            <td>C</td>
        </tr>

    </table>
</body>

</html>
